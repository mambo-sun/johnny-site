<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Johnny! Takes San Francisco</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .game-page {
      padding: var(--spacing-lg) 0 var(--spacing-xl);
      text-align: center;
    }
    .game-page h1 {
      font-size: 2rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-accent);
      margin-bottom: var(--spacing-md);
    }
    /* The stage owns the width; the frame owns the ratio. Sizing has to live off
       the canvas because kaplay overwrites the canvas' style attribute at init,
       so the rules on #game-canvas below are only a pre-boot fallback. The stage
       never spills past the column and shrinks to stay on screen on short
       landscape phones; position:relative anchors the touch bar overlay. */
    .game-stage {
      position: relative;
      width: min(800px, 100%, max(320px, calc((100vh - 200px) * 1.6)));
      width: min(800px, 100%, max(320px, calc((100svh - 200px) * 1.6)));
      margin: 0 auto;
      overscroll-behavior: contain;   /* no rubber-band bounce while playing */
    }
    .game-frame {
      width: 100%;
      aspect-ratio: 8 / 5;
    }
    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
      border: 2px solid var(--color-accent);
      /* kaplay preventDefaults its own canvas touch events, which already stops
         double-tap zoom; this is the belt to that pair of braces. */
      touch-action: none;
    }

    /* ── Touch controls ──────────────────────────────────────────────────────
       Hidden outright on desktop — touch-controls.js also attaches no listeners
       there, so this is dead weight on a mouse machine. */
    .touch-controls { display: none; }

    @media (pointer: coarse) {
      /* The 2rem desktop gutter costs a phone 64px of canvas. Give it back. */
      .game-page .container { padding-left: var(--spacing-sm); padding-right: var(--spacing-sm); }

      /* Two rows: movement and actions on the first, the utility chips centred
         under them on the second. The groups are grid columns rather than
         content-sized boxes, and the buttons inside them are allowed to shrink,
         so a narrow phone squeezes the row instead of pushing HIT off-screen. */
      .touch-controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-areas:
          "move act"
          "util util";
        row-gap: 10px;
        column-gap: var(--spacing-md);   /* keeps the two thumb clusters apart */
        margin-top: var(--spacing-md);
        width: 100%;
        /* On the container too, not just the buttons: a drag starting in the
           gap between two buttons would otherwise scroll the page. */
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }
      .touch-controls > div { display: flex; gap: 10px; min-width: 0; }
      .tc-move { grid-area: move; justify-content: flex-start; }
      .tc-act  { grid-area: act;  justify-content: flex-end; }
      .tc-util { grid-area: util; justify-content: center; }

      .touch-controls button {
        flex: 1 1 auto;
        max-width: 96px;
        font-family: var(--font-main);
        font-size: 1.5rem;
        line-height: 1;
        color: var(--color-text);
        background: var(--color-surface);
        border: 2px solid var(--color-accent);
        min-width: 0;
        width: 64px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: center;

        /* Every rule below is load-bearing on iOS Safari:
           touch-action  — kills double-tap-to-zoom AND the page scrolling out
                           from under a thumb that drifts off a button.
           tap-highlight — kills the grey flash on every tap.
           callout/select— kills the long-press magnifier and text selection.
           (user-scalable=no in the viewport meta is ignored since iOS 10, so
           touch-action is the only lever that actually works here.) */
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        cursor: pointer;
      }
      /* Keep the ring for keyboard focus, drop the one a tap leaves behind. */
      .touch-controls button:focus:not(:focus-visible) { outline: none; }

      /* Pressed state is driven by a JS class, not :active — on iOS :active is
         unreliable and strands buttons lit after the finger is gone. */
      .touch-controls button.is-on {
        background: var(--color-accent);
        color: var(--color-bg);
      }

      /* Words, not glyphs, for the actions: at 64px a fist or a filled circle
         reads as "some dark shape", and the HUD is text-forward anyway. */
      .touch-controls .tc-word {
        font-size: 0.85rem;
        letter-spacing: 0.08em;
        font-weight: bold;
        color: var(--color-accent);
      }
      .touch-controls .tc-word.is-on { color: var(--color-bg); }

      .touch-controls .tc-util button {
        flex: 0 0 auto;
        width: 44px;
        height: 44px;
        font-size: 1rem;
        border-color: var(--color-muted);
        color: var(--color-muted);
      }
    }

    /* Landscape goes full-bleed and puts the controls in the SIDE MARGINS rather
       than on the field. A phone is ~2.2:1 and the game is 8:5, so holding the
       canvas to the viewport height always leaves dead space at both edges —
       which is exactly where thumbs already are. Nothing covers the street, and
       the canvas stays as large as the height allows. Rotate to portrait for the
       site nav. FLANK is the width reserved per side; the canvas is sized from
       whatever height is left after it. */
    @media (orientation: landscape) and (pointer: coarse) {
      /* Flank must clear the WIDEST cluster (JUMP+HIT ≈ 138px) plus its edge
         inset, or a height-limited canvas on a short phone grows wide enough to
         slide under the buttons. 160px leaves a ~12px gap at the tightest size. */
      .game-page { --flank: 160px; padding: 0; }
      header, footer, .game-page h1 { display: none; }
      .game-page .container { padding: 0; max-width: none; }

      .game-stage {
        width: 100%;
        height: 100vh;
        height: 100svh;
        display: grid;
        place-items: center;
      }
      .game-frame {
        height: min(100vh, calc((100vw - var(--flank) * 2) / 1.6));
        height: min(100svh, calc((100vw - var(--flank) * 2) / 1.6));
        width: auto;
      }
      #game-canvas { border-width: 0; }

      /* The bar becomes a full-stage layer that only its buttons can be touched
         through, so the groups can sit in the margins without a box in the
         middle swallowing taps meant for the game. */
      .touch-controls {
        position: absolute;
        inset: 0;
        display: block;
        margin-top: 0;
        pointer-events: none;
      }
      .touch-controls > div {
        position: absolute;
        pointer-events: auto;
      }
      .tc-move { left: max(10px, env(safe-area-inset-left));  bottom: 12%; }
      .tc-act  { right: max(10px, env(safe-area-inset-right)); bottom: 12%; }
      .tc-util { left: max(10px, env(safe-area-inset-left));  top: max(10px, env(safe-area-inset-top)); }
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <div class="container">
        <!-- Toggle button: a sibling of the <ul>, inside the same container.
          CSS will hide it on desktop and reveal it on mobile.
          aria-* attributes tell screen readers what it does and its state. -->
          <button
              class="nav-toggle"
              aria-label="Toggle navigation menu"
              aria-expanded="false"
              aria-controls="primary-nav">
              &#9776; <!-- ☰ hamburger icon (Unicode U+2630), no image needed -->
          </button>
        <ul class="nav-links" id="primary-nav">
          <li><a href="index.html">Home</a></li>
          <li><a href="media.html">Photos/Videos</a></li>
          <li><a href="shows.html">Shows</a></li>
          <li><a href="game.html" aria-current="page">Game</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <main>
    <section class="game-page">
      <div class="container">
        <h1>Johnny! Takes San Francisco</h1>
        <div class="game-stage">
          <div class="game-frame">
            <canvas id="game-canvas"></canvas>
          </div>

          <!-- Revealed by touch-controls.js only on a coarse pointer. Each
               data-btn maps to a virtual button name declared in game.js. -->
          <div class="touch-controls" id="touch-controls" hidden>
            <div class="tc-move">
              <button type="button" data-btn="left"  aria-label="Move left">&#9664;</button>
              <button type="button" data-btn="right" aria-label="Move right">&#9654;</button>
            </div>
            <div class="tc-util">
              <button type="button" data-act="mute" aria-pressed="false" aria-label="Mute">&#128266;</button>
              <button type="button" data-act="quit" aria-label="Quit to character select">&#10005;</button>
            </div>
            <div class="tc-act">
              <button type="button" class="tc-word" data-btn="jump"  aria-label="Jump">JUMP</button>
              <button type="button" class="tc-word" data-btn="punch" aria-label="Punch">HIT</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 Johnny. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://unpkg.com/kaplay@3001/dist/kaplay.js"></script>
  <script src="js/audio.js?v=2"></script>
  <script src="js/touch-controls.js?v=2"></script>
  <script src="js/game.js?v=10"></script>
  <script src="js/nav.js"></script>
</body>
</html>
