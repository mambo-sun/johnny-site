<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Johnny — Shows</title>
    <link rel="stylesheet" href="css/style.css" />         <!-- existing site styles -->
    <link rel="stylesheet" href="css/calendar.css" />       <!-- new: calendar-only styles -->
</head>
<body>
    <header>
        <nav>
            <div class="container">

                <!-- Toggle button: a sibling of the <ul>, inside the same container.
                    CSS will hide it on desktop and reveal it on mobile.
                    aria-* attributes tell screen readers what it does and its state. -->
                <button
                    class="nav-toggle"
                    aria-label="Toggle navigation menu"
                    aria-expanded="false"
                    aria-controls="primary-nav">
                    &#9776; <!-- ☰ hamburger icon (Unicode U+2630), no image needed -->
                </button>

                <ul class="nav-links" id="primary-nav">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="media.html">Photos/Videos</a></li>
                    <li><a href="shows.html" aria-current="page">Shows</a></li>
                    <li><a href="game.html">Game</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="calendar-page">
        <!-- Month + year, e.g. "FEBRUARY 2026". JS writes into this. -->
        <h1 id="calendar-title" class="calendar-title">Loading...</h1>

        <!-- Fixed weekday header row: Sun-Sat -->
        <div class="weekday-row">
            <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span>
            <span>Thu</span><span>Fri</span><span>Sat</span>
        </div>

        <!-- The grid of day squares. JS injects the cells INTO this container. -->
        <div id="calendar-grid" class="calendar-grid"></div>

        <!-- Arrows BELOW the calendar -->
        <div class="calendar-controls">
            <button id="prev-month" class="cal-arrow" aria-label="Previous month">&#10094;</button>
            <button id="next-month" class="cal-arrow" aria-label="Next month">&#10095;</button>
        </div>
    </main>

    <!-- Modal: sits in the HTML but stays hidden until a show cell is clicked -->
    <div id="show-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <div id="modal-close" class="modal-close" aria-label="Close">&times;</div>
            <div id="modal-content"></div>      <!-- JS fills this with the show details -->
        </div> 
    </div>

    <script src="js/calendar.js"></script>
    <script src="js/nav.js"></script>
</body>
</html>
